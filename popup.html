<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MarkClip</title>
  <style>
    :root {
      --bg: #07101c;
      --surface: #111827;
      --surface-2: #182233;
      --border: rgba(148, 163, 184, 0.18);
      --accent: #2ee6a6;
      --accent-dim: rgba(46, 230, 166, 0.13);
      --primary: #2aa8ff;
      --text: #f2f6fb;
      --text-muted: #93a4b8;
      --error: #ff7474;
      --radius: 14px;
    }

    body.light {
      --bg: #f5f8fc;
      --surface: #ffffff;
      --surface-2: #edf4fb;
      --border: rgba(15, 23, 42, 0.12);
      --accent: #0fae7a;
      --accent-dim: rgba(15, 174, 122, 0.12);
      --primary: #138ff2;
      --text: #172033;
      --text-muted: #637084;
      --error: #d64242;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 330px;
      min-height: 240px;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      overflow: hidden;
    }

    .header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 14px 10px;
    }

    h1 { font-size: 16px; font-weight: 800; line-height: 1.2; }
    .subtitle { margin-top: 4px; color: var(--text-muted); font-size: 12px; }

    .icon-btn {
      width: 32px;
      height: 32px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--surface-2);
      color: var(--text-muted);
      cursor: pointer;
      font-size: 15px;
    }

    .content { padding: 0 14px 14px; }

    .status {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 10px 12px;
      border-radius: var(--radius);
      background: var(--accent-dim);
      border: 1px solid rgba(46, 230, 166, 0.24);
      color: var(--accent);
      font-size: 13px;
      font-weight: 750;
      margin-bottom: 12px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      display: inline-block;
      margin-right: 8px;
      background: var(--accent);
    }

    .badge {
      border-radius: 999px;
      padding: 3px 8px;
      background: rgba(46, 230, 166, 0.12);
      font-size: 11px;
      white-space: nowrap;
    }

    .panel {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: linear-gradient(180deg, var(--surface), var(--bg));
      padding: 12px;
      margin-bottom: 12px;
    }

    .label { color: var(--text-muted); font-size: 12px; margin-bottom: 9px; }

    .mode-toggle {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
      background: var(--surface-2);
      border-radius: 14px;
      padding: 4px;
      margin-bottom: 10px;
    }

    .mode-btn {
      border: 0;
      border-radius: 11px;
      padding: 8px 6px;
      background: transparent;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 750;
      cursor: pointer;
    }

    .mode-btn.active {
      background: rgba(42, 168, 255, 0.28);
      box-shadow: inset 0 0 0 1px rgba(42, 168, 255, 0.25);
      color: var(--text);
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding-top: 8px;
    }

    .row + .row { margin-top: 7px; }
    .row-text { color: var(--text-muted); font-size: 12px; line-height: 1.35; }
    .row-title { color: var(--text); font-weight: 650; }

    .switch {
      width: 46px;
      height: 26px;
      flex: 0 0 auto;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      position: relative;
      cursor: pointer;
    }

    .switch::after {
      content: "";
      position: absolute;
      top: 3px;
      left: 3px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--text-muted);
      transition: transform .16s, background .16s;
    }

    .switch.on {
      background: var(--accent-dim);
      border-color: rgba(46, 230, 166, .35);
    }

    .switch.on::after {
      transform: translateX(20px);
      background: var(--accent);
    }

    .error-msg {
      display: none;
      color: var(--error);
      background: rgba(255, 116, 116, 0.1);
      border: 1px solid rgba(255, 116, 116, 0.28);
      border-radius: var(--radius);
      padding: 9px 11px;
      margin-bottom: 10px;
      font-size: 12px;
    }

    .error-msg.visible { display: block; }

    .stats {
      display: none;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 10px;
    }

    .stats.visible { display: grid; }

    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 8px;
      text-align: center;
    }

    .stat-value { color: var(--accent); font-size: 15px; font-weight: 800; }
    .stat-label { margin-top: 2px; color: var(--text-muted); font-size: 10px; }

    .preview-box {
      display: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 10px;
      margin-bottom: 12px;
    }

    .preview-box.visible { display: block; }
    .preview-title { display: flex; justify-content: space-between; gap: 8px; color: var(--text-muted); font-size: 11px; margin-bottom: 6px; }
    .preview-content { max-height: 88px; overflow: hidden; white-space: pre-wrap; word-break: break-word; color: var(--text); font-family: ui-monospace, SFMono-Regular, Consolas, monospace; font-size: 11px; line-height: 1.55; }

    .btn-group { display: grid; grid-template-columns: 1fr 1fr auto; gap: 9px; }

    .btn {
      min-height: 42px;
      border: 0;
      border-radius: 999px;
      padding: 0 14px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 800;
    }

    .btn-primary { background: var(--primary); color: #fff; }
    .btn-secondary { background: var(--surface-2); color: var(--text); }
    .btn-ghost { width: 44px; padding: 0; background: var(--surface-2); color: var(--text-muted); }
    .btn.loading { opacity: .66; pointer-events: none; }

    .toast {
      position: fixed;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%) translateY(18px);
      background: var(--accent);
      color: #06120d;
      font-size: 12px;
      font-weight: 800;
      padding: 6px 14px;
      border-radius: 999px;
      opacity: 0;
      transition: all .18s ease;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1>MarkClip</h1>
      <div class="subtitle">网页正文，一键转 Markdown</div>
    </div>
    <button class="icon-btn" id="themeToggle" title="深浅色切换">◐</button>
  </div>

  <div class="content">
    <div class="status">
      <span><span class="dot"></span><span id="statusText">可导出当前内容</span></span>
      <span class="badge" id="pageTitle">主内容</span>
    </div>

    <div class="panel">
      <div class="label">导出模式</div>
      <div class="mode-toggle" aria-label="提取模式">
        <button class="mode-btn active" data-mode="main">主内容</button>
        <button class="mode-btn" data-mode="pick">框选</button>
        <button class="mode-btn" data-mode="full">全页</button>
      </div>
      <div class="row">
        <div class="row-text"><span class="row-title">移除图片链接</span><br />减少给 AI 的 token 消耗</div>
        <button class="switch" id="removeImagesSwitch" type="button" aria-label="移除图片链接"></button>
      </div>
      <div class="row">
        <div class="row-text"><span class="row-title">页面悬浮按钮</span><br />在普通网页右下角显示快捷入口</div>
        <button class="switch" id="floatingSwitch" type="button" aria-label="页面悬浮按钮"></button>
      </div>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="stats" id="stats">
      <div class="stat">
        <div class="stat-value" id="statChars">-</div>
        <div class="stat-label">字符数</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="statLines">-</div>
        <div class="stat-label">行数</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="statWords">-</div>
        <div class="stat-label">估算词数</div>
      </div>
    </div>

    <div class="preview-box" id="previewBox">
      <div class="preview-title">
        <span>预览</span>
        <span id="previewTitle"></span>
      </div>
      <div class="preview-content" id="previewContent"></div>
    </div>

    <div class="btn-group">
      <button class="btn btn-primary" id="btnDownload">下载</button>
      <button class="btn btn-secondary" id="btnCopy">复制</button>
      <button class="btn btn-ghost" id="btnConvert" title="刷新"><span id="convertIcon">↻</span></button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="page2md-core.js"></script>
  <script src="extension-utils.js"></script>
  <script src="popup.js"></script>
</body>
</html>
